name: Build FloatSwitcher Dylib

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-13
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Unzip project
        run: |
          unzip FloatSwitcher.zip -d extracted
          cp -r extracted/FloatSwitcher/* ./

      - name: Install dependencies
        run: brew install ldid dpkg

      - name: Install Theos
        run: |
          git clone --recursive \
            https://github.com/theos/theos.git $HOME/theos
          echo "THEOS=$HOME/theos" >> $GITHUB_ENV

      - name: Download iOS 16 SDK
        run: |
          mkdir -p $HOME/theos/sdks
          curl -L https://github.com/theos/sdks/releases/download/iPhoneOS16.5/iPhoneOS16.5.sdk.tar.xz \
            -o /tmp/sdk.tar.xz
          tar -xf /tmp/sdk.tar.xz -C $HOME/theos/sdks/

      - name: Build dylib
        run: |
          export THEOS=$HOME/theos
          export PATH=$THEOS/bin:$PATH
          make clean && make FINALPACKAGE=1

      - name: Find and copy dylib
        run: |
          DYLIB=$(find .theos -name "FloatSwitcher.dylib" | head -1)
          echo "Found: $DYLIB"
          cp "$DYLIB" FloatSwitcher.dylib

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: FloatSwitcher-dylib
          path: FloatSwitcher.dylib
          retention-days: 30
